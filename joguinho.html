<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para Você ❤️</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    .yes { background: #4CAF50; color: white; }
    .no { background: #f44336; color: white; position: relative; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Oi amor ❤️</h1>
    <p id="text">Eu tenho uma pergunta muito importante pra você...</p>
    <button class="yes" onclick="nextStep()">Continuar</button>
    <div id="choices" style="display:none;">
      <p>Você me ama?</p>
      <button class="yes" onclick="yesAnswer()">Sim 💖</button>
      <button class="no" onmouseover="moveButton(this)">Não 😢</button>
    </div>
  </div>

  <script>
    function nextStep() {
      document.querySelector('.yes').style.display = 'none';
      document.getElementById('text').style.display = 'none';
      document.getElementById('choices').style.display = 'block';
    }

    function yesAnswer() {
      document.querySelector('.container').innerHTML = `
        <h1>EU SABIA 😍</h1>
        <p>Eu te amo muito mais do que qualquer código consegue explicar ❤️</p>
        <p>Você é a melhor coisa que já aconteceu na minha vida 💕</p>
      `;
    }

    function moveButton(btn) {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      btn.style.transform = `translate(${x}px, ${y}px)`;
    }
  </script>
</body>
</html>

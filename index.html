<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: aparecer 1.5s ease;
}

h1 {
  margin-bottom: 10px;
}

p {
  font-size: 18px;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.heart {
  position: absolute;
  color: white;
  animation: subir 4s linear infinite;
}

@keyframes subir {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Oi, lanna ❤️</h1>
  <p>Eu fiz isso aqui só pra te lembrar o quanto você é especial pra mim.</p>

  <button onclick="mostrar()">Abrir 💌</button>

  <p id="msg" style="display:none; margin-top:15px;">
    Você foi a melhor parte da minha vida 💖<br>
    Eu te amo mais do que qualquer coisa.
  </p>
</div>

<script>
function mostrar() {
  document.getElementById("msg").style.display = "block";
}

// corações subindo
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 4000);
}, 300);
</script>

</body>
</html>

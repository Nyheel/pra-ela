<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #ff758c, #1a001f);
  color: white;
}

/* estrelas */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* card */
.card {
  text-align: center;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
  width: 350px;
}

/* coração */
.heart {
  font-size: 40px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* botão */
button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* texto */
#texto {
  margin-top: 20px;
  font-size: 18px;
  min-height: 80px;
}
</style>
</head>

<body>

<div class="card">
  <div class="heart">❤️</div>
  <h1>Oi, meu bem</h1>
  <button onclick="start()">Surpresa :D 💌</button>
  <div id="texto"></div>
</div>

<!-- PLAYER INVISÍVEL DO YOUTUBE -->
<iframe id="ytplayer"
width="0" height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>

<script>
// estrelas
for(let i=0;i<100;i++){
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random()*100+"vw";
  star.style.top = Math.random()*100+"vh";
  document.body.appendChild(star);
}

// mensagem (edita aqui se quiser)
const mensagem = "Você é a melhor coisa que já aconteceu na minha vida... Eu te amo mais do que palavras conseguem explicar ❤️";

function start(){
  // toca música
  let player = document.getElementById("ytplayer");
  player.src = "https://www.youtube.com/embed/izGwDsrQ1eQ?autoplay=1&loop=1&playlist=izGwDsrQ1eQ";

  // efeito digitando
  let i = 0;
  let speed = 40;

  function digitar(){
    if(i < mensagem.length){
      document.getElementById("texto").innerHTML += mensagem.charAt(i);
      i++;
      setTimeout(digitar, speed);
    }
  }

  digitar();
}
</script>

</body>
</html>

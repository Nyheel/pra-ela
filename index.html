<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
}

h1 {
  margin-top: 100px;
  font-size: 40px;
}

p {
  font-size: 20px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff1f4b;
}

/* corações caindo */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Oi, meu amor ❤️</h1>
<p>Eu fiz isso aqui só pra te lembrar o quanto você é especial pra mim.</p>

<button onclick="mostrar()">Clica aqui 💌</button>

<p id="msg" style="display:none; margin-top:20px;">
  Você é a melhor coisa que aconteceu na minha vida 💖<br>
  Eu te amo mais do que consigo explicar.
</p>

<script>
function mostrar() {
  document.getElementById("msg").style.display = "block";
}

// criar corações caindo
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
